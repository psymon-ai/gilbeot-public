plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.psymon.gilbeot"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.psymon.gilbeot"
        minSdk = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        externalNativeBuild {
            cmake {
                cppFlags "-std=c++17 -fvisibility=hidden"
            }
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            // Mediapipe (flutter_gemma 의존성)의 일부 protobuf 클래스가 R8 의
            // missing-class 체크에 걸려 release 빌드가 실패한다 (런타임엔
            // 사용 안 됨). minify/shrinkResources 둘 다 비활성화 — APK 크기는
            // model (2.4 GB) 에 비해 무시할 수 있고, dead code 제거 효과가
            // 크지 않다. 추후 missing_rules.txt 적용으로 minify 켤 수 있음.
            minifyEnabled false
            shrinkResources false
        }
    }

    packaging {
        jniLibs {
            keepDebugSymbols += ["**/libcactus_asr.so"]
        }
    }

    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
        }
    }
}

flutter {
    source = "../.."
}
